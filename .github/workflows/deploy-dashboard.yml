name: Deploy dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - dashboard-app/**
      - MD/**
      - AGENTS.md
      - .github/workflows/deploy-dashboard.yml
  workflow_dispatch:
    inputs:
      deploy_api_mode:
        description: "API mode for deploy (mock or http)"
        required: false
        default: mock
        type: choice
        options:
          - mock
          - http
      dashboard_api_base_url:
        description: "Backend base URL (required for HTTP mode)"
        required: false
        default: ""


permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard-app/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install

      - name: Resolve dashboard deploy mode
        id: deploy_mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            deploy_mode="${{ github.event.inputs.deploy_api_mode }}"
            if [ "$deploy_mode" != "http" ] && [ "$deploy_mode" != "mock" ]; then
              deploy_mode="mock"
            fi
            base_url="${{ github.event.inputs.dashboard_api_base_url }}"
          else
            base_url="${{ vars.DASHBOARD_API_BASE_URL }}"
            if [ -n "$base_url" ]; then
              deploy_mode="http"
            else
              deploy_mode="mock"
            fi
          fi
          echo "deploy_mode=$deploy_mode" >> "$GITHUB_OUTPUT"
          echo "dashboard_api_base_url=$base_url" >> "$GITHUB_OUTPUT"

      - name: Verify API runtime configuration
        if: steps.deploy_mode.outputs.deploy_mode == 'http'
        env:
          DASHBOARD_API_BASE_URL: ${{ steps.deploy_mode.outputs.dashboard_api_base_url }}
        run: |
          test -n "$DASHBOARD_API_BASE_URL"

      - name: Verify deployment gate
        env:
          VITE_ROUTER_MODE: hash
          VITE_USE_MOCK_API: ${{ steps.deploy_mode.outputs.deploy_mode == 'mock' && 'true' || 'false' }}
          VITE_API_BASE_URL: ${{ steps.deploy_mode.outputs.dashboard_api_base_url }}
        run: npm run verify:deploy

      - name: Copy SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard-app/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
