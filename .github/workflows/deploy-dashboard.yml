name: Deploy dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - dashboard-app/**
      - MD/**
      - AGENTS.md
      - .github/workflows/deploy-dashboard.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard-app/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install

      - name: Verify API runtime configuration
        env:
          DASHBOARD_API_BASE_URL: ${{ vars.DASHBOARD_API_BASE_URL }}
        run: |
          test -n "$DASHBOARD_API_BASE_URL"

      - name: Verify deployment gate
        env:
          VITE_ROUTER_MODE: hash
          VITE_USE_MOCK_API: "false"
          VITE_API_BASE_URL: ${{ vars.DASHBOARD_API_BASE_URL }}
        run: npm run verify:deploy

      - name: Copy SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard-app/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
